<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Publish UI Prototype</title>
<style>
  /* ============================================
     DESIGN SYSTEM — Cohere-inspired
     Token: DESIGN.md (Cohere style)
     Font: Unica77 → Inter → system-ui
     ============================================ */
  :root {
    /* Colors */
    --primary: #17171c;
    --cohere-black: #000000;
    --ink: #212121;
    --deep-green: #003c33;
    --dark-navy: #071829;
    --canvas: #ffffff;
    --soft-stone: #eeece7;
    --pale-green: #edfce9;
    --pale-blue: #f1f5ff;
    --hairline: #d9d9dd;
    --border-light: #e5e7eb;
    --muted: #93939f;
    --slate: #75758a;
    --action-blue: #1863dc;
    --coral: #ff7759;
    --coral-soft: #ffad9b;
    --on-primary: #ffffff;
    --on-dark: #ffffff;
    --error: #b30000;

    /* Typography */
    --font-display: 'CohereText', 'Space Grotesk', 'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-body: 'Unica77 Cohere Web', 'Inter', Arial, ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'CohereMono', 'JetBrains Mono', 'Fira Code', monospace;

    /* Radii */
    --r-xs: 4px;
    --r-sm: 8px;
    --r-md: 16px;
    --r-lg: 22px;
    --r-xl: 30px;
    --r-pill: 32px;
    --r-full: 9999px;

    /* Spacing */
    --s-xxs: 2px;
    --s-xs: 6px;
    --s-sm: 8px;
    --s-md: 12px;
    --s-lg: 16px;
    --s-xl: 24px;
    --s-xxl: 32px;
    --s-section: 80px;

    /* Shadows */
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-panel: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-nav: 0 1px 0 var(--hairline);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--canvas);
    color: var(--ink);
    overflow: hidden;
    height: 100vh;
  }

  /* ============================================
     LAYOUT: Top Nav + Content Split
     ============================================ */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* --- Top Navigation Bar --- */
  .top-nav {
    display: flex;
    align-items: center;
    height: 56px;
    padding: 0 var(--s-xl);
    background: var(--canvas);
    border-bottom: 1px solid var(--hairline);
    flex-shrink: 0;
    gap: var(--s-xl);
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: var(--s-sm);
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: var(--primary);
    white-space: nowrap;
  }

  .nav-brand-icon {
    width: 28px;
    height: 28px;
    background: var(--primary);
    border-radius: var(--r-xs);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--on-primary);
    font-size: 14px;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: var(--s-xs);
    flex: 1;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: var(--s-xs);
    padding: var(--s-sm) var(--s-lg);
    border-radius: var(--r-xs);
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
    border: none;
    background: none;
    text-decoration: none;
    white-space: nowrap;
  }

  .nav-link:hover {
    color: var(--ink);
    background: var(--soft-stone);
  }

  .nav-link.active {
    color: var(--primary);
    background: var(--soft-stone);
    font-weight: 500;
  }

  .nav-link svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: var(--s-lg);
    flex-shrink: 0;
  }

  /* Platform status dots */
  .platform-indicators {
    display: flex;
    align-items: center;
    gap: var(--s-sm);
  }

  .platform-dot {
    width: 8px;
    height: 8px;
    border-radius: var(--r-full);
    background: var(--hairline);
    position: relative;
  }
  .platform-dot.online { background: #22c55e; }
  .platform-dot.offline { background: var(--hairline); }
  .platform-dot.error { background: var(--coral); }

  .platform-dot::after {
    content: attr(data-label);
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-top: 2px;
    font-size: 9px;
    color: var(--muted);
    white-space: nowrap;
  }

  .nav-avatar {
    width: 32px;
    height: 32px;
    border-radius: var(--r-full);
    background: var(--soft-stone);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
  }

  /* --- Main Content: Split Screen --- */
  .main-content {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Left Panel: Editor */
  .editor-panel {
    width: 420px;
    min-width: 380px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--hairline);
    background: var(--canvas);
    flex-shrink: 0;
  }

  .editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--s-lg) var(--s-xl);
    border-bottom: 1px solid var(--hairline);
  }

  .editor-header h2 {
    font-size: 16px;
    font-weight: 500;
    color: var(--primary);
  }

  .editor-header-actions {
    display: flex;
    gap: var(--s-sm);
  }

  .editor-body {
    flex: 1;
    overflow-y: auto;
    padding: var(--s-xl);
    display: flex;
    flex-direction: column;
    gap: var(--s-lg);
  }

  /* --- Form Elements --- */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: var(--s-xs);
  }

  .form-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-input {
    width: 100%;
    padding: var(--s-sm) var(--s-md);
    border: 1px solid var(--hairline);
    border-radius: var(--r-xs);
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    background: var(--canvas);
    outline: none;
    transition: border-color 0.15s ease;
  }

  .form-input:focus {
    border-color: var(--primary);
  }

  .form-textarea {
    width: 100%;
    min-height: 120px;
    padding: var(--s-sm) var(--s-md);
    border: 1px solid var(--hairline);
    border-radius: var(--r-xs);
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    background: var(--canvas);
    outline: none;
    resize: vertical;
    transition: border-color 0.15s ease;
  }

  .form-textarea:focus {
    border-color: var(--primary);
  }

  /* --- Platform Tag Selector --- */
  .platform-selector {
    display: flex;
    flex-wrap: wrap;
    gap: var(--s-xs);
  }

  .platform-tag {
    display: flex;
    align-items: center;
    gap: var(--s-xs);
    padding: var(--s-xs) var(--s-md);
    border-radius: var(--r-pill);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--hairline);
    background: var(--canvas);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .platform-tag:hover {
    border-color: var(--muted);
    color: var(--ink);
  }

  .platform-tag.active {
    border-color: var(--primary);
    background: var(--primary);
    color: var(--on-primary);
  }

  .platform-tag .dot {
    width: 6px;
    height: 6px;
    border-radius: var(--r-full);
    background: currentColor;
    opacity: 0.5;
  }

  .platform-tag.active .dot {
    opacity: 1;
  }

  /* --- Buttons --- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--s-xs);
    padding: var(--s-sm) var(--s-xl);
    border-radius: var(--r-pill);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
    cursor: pointer;
    transition: all 0.15s ease;
    border: none;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--primary);
    color: var(--on-primary);
  }
  .btn-primary:hover {
    background: var(--cohere-black);
  }

  .btn-secondary {
    background: transparent;
    color: var(--ink);
    padding: var(--s-sm) 0;
    border-radius: 0;
  }
  .btn-secondary:hover {
    color: var(--primary);
    text-decoration: underline;
  }

  .btn-outline {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--hairline);
  }
  .btn-outline:hover {
    border-color: var(--muted);
  }

  .btn-sm {
    padding: 4px var(--s-md);
    font-size: 12px;
    border-radius: var(--r-pill);
  }

  .btn-publish {
    background: var(--primary);
    color: var(--on-primary);
    padding: var(--s-sm) var(--s-xxl);
    font-size: 14px;
    width: 100%;
  }
  .btn-publish:hover {
    background: var(--cohere-black);
  }

  /* --- Right Panel: Browser View --- */
  .browser-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--soft-stone);
  }

  .browser-toolbar {
    display: flex;
    align-items: center;
    gap: var(--s-sm);
    padding: var(--s-sm) var(--s-lg);
    background: var(--canvas);
    border-bottom: 1px solid var(--hairline);
  }

  .browser-url-bar {
    flex: 1;
    display: flex;
    align-items: center;
    gap: var(--s-xs);
    padding: var(--s-xs) var(--s-md);
    background: var(--soft-stone);
    border-radius: var(--r-xs);
    font-size: 12px;
    color: var(--muted);
  }

  .browser-url-bar .lock-icon {
    color: var(--muted);
    font-size: 10px;
  }

  .browser-url-bar .url {
    color: var(--slate);
  }

  .browser-viewport {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--canvas);
    margin: var(--s-md);
    border-radius: var(--r-sm);
    border: 1px solid var(--hairline);
    overflow: hidden;
    position: relative;
  }

  .browser-placeholder {
    text-align: center;
    color: var(--muted);
  }

  .browser-placeholder .icon {
    font-size: 48px;
    margin-bottom: var(--s-lg);
    opacity: 0.3;
  }

  .browser-placeholder p {
    font-size: 14px;
  }

  .browser-placeholder .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: var(--s-xs);
  }

  /* --- Status Bar --- */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 32px;
    padding: 0 var(--s-lg);
    background: var(--primary);
    color: var(--on-dark);
    font-size: 11px;
    flex-shrink: 0;
  }

  .status-bar .left {
    display: flex;
    align-items: center;
    gap: var(--s-lg);
  }

  .status-bar .right {
    display: flex;
    align-items: center;
    gap: var(--s-lg);
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: var(--s-xs);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: var(--r-full);
    background: #22c55e;
  }
  .status-dot.busy { background: #f59e0b; }
  .status-dot.off { background: var(--muted); }

  /* --- Action Bar (bottom of editor) --- */
  .editor-footer {
    padding: var(--s-lg) var(--s-xl);
    border-top: 1px solid var(--hairline);
    display: flex;
    flex-direction: column;
    gap: var(--s-sm);
  }

  .publish-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }

  .publish-meta .schedule {
    display: flex;
    align-items: center;
    gap: var(--s-xs);
  }

  /* --- Scrollbar --- */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: var(--r-full); }

  /* --- Split Section Card --- */
  .section-card {
    border: 1px solid var(--hairline);
    border-radius: var(--r-sm);
    overflow: hidden;
  }

  .section-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--s-md) var(--s-lg);
    background: var(--soft-stone);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }

  .section-card-body {
    padding: var(--s-lg);
    display: flex;
    flex-direction: column;
    gap: var(--s-md);
  }

  /* --- Divider --- */
  .divider {
    height: 1px;
    background: var(--hairline);
    margin: var(--s-sm) 0;
  }

  /* --- Tabs inside editor --- */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--hairline);
  }

  .tab-item {
    padding: var(--s-sm) var(--s-lg);
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s ease;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: var(--font-body);
  }

  .tab-item:hover { color: var(--ink); }
  .tab-item.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    font-weight: 500;
  }

  /* Platform select checkboxes inline */
  .platform-check-group {
    display: flex;
    flex-wrap: wrap;
    gap: var(--s-xs);
  }

  /* Icons via inline SVG where possible, fallback text */
  .icon { display: inline-flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="app">

  <!-- ═══ Top Navigation Bar ═══ -->
  <nav class="top-nav">
    <div class="nav-brand">
      <div class="nav-brand-icon">M</div>
      Multi-Publish
    </div>

    <div class="nav-links">
      <button class="nav-link active">

      <button class="nav-link">

      </button>

    <div class="nav-right">
      <div class="platform-indicators">
        <div class="platform-dot online" data-label="微信"></div>

  </nav>

  <!-- ═══ Main Content: Split Screen ═══ -->
  <div class="main-content">

      <div class="editor-header">

        <div class="editor-header-actions">
          <button class="btn btn-outline btn-sm">存草稿</button>

      </div>

      <div class="editor-body">

        <!-- Platform Selection -->
        <div class="form-group">
          <label class="form-label">发布平台</label>
          <div class="platform-selector">
            <button class="platform-tag active"><span class="dot"></span>微信</button>
            <button class="platform-tag active"><span class="dot"></span>知乎</button>

            <button class="platform-tag"><span class="dot"></span>抖音</button>
            <button class="platform-tag active"><span class="dot"></span>小红书</button>

        </div>

        <!-- Title -->

        </div>

    <!-- Right: Browser View -->

          <p class="sub">Playwright 渲染引擎 · 微信公众平台</p>
        </div>
      </div>

      <!-- Split Screen Indicator -->
      <div style="display:flex; gap:var(--s-sm); padding:0 var(--s-lg) var(--s-sm);">
        <button class="btn btn-outline btn-sm" style="background:var(--canvas);">微信 · 已连接</button>

        <button class="btn btn-outline btn-sm" style="opacity:0.5;">小红书</button>
      </div>
    </div>
  </div>

  <!-- ═══ Status Bar ═══ -->
  <div class="status-bar">
    <div class="left">
      <span class="status-indicator">
        <span class="status-dot"></span>
        运行中
      </span>
      <span>5 个平台 · 3 在线</span>
    </div>
    <div class="right">
      <span>v1.0.0</span>
      <span>最后发布: 10 分钟前</span>
    </div>
  </div>

</div>
</body>
