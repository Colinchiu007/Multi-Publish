[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "multi-publish-backend"
version = "1.0.0"
description = "Multi-Publish Python Backend (FastAPI + RPA)"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "cryptography>=42.0.0",
    "httpx>=0.27.0",
    "loguru>=0.7.0",
    "playwright>=1.50.0",
]

[project.optional-dependencies]
web = [
    "jinja2>=3.1",
    "pyyaml>=6.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["multi_publish*", "wechat_publisher*"]

[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["**/__pycache__", "**/*.pyc"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["multi_publish", "wechat_publisher"]