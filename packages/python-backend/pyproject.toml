[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "multi-publish-backend"
version = "1.0.0"
description = "Multi-Publish Python Backend (FastAPI + RPA)"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "cryptography>=42.0.0",
    "httpx>=0.27.0",
    "loguru>=0.7.0",
]

[project.optional-dependencies]
web = [
    "jinja2>=3.1",
    "pyyaml>=6.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["multi_publish*", "wechat_publisher*"]