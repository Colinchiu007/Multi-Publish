<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="template:media-width" content="1792">
<meta name="template:media-height" content="1024">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1920px;
    height: 1080px;
    font-family: 'Noto Sans CJK SC', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0b0e14 0%, #1a2332 50%, #2d3a4e 100%);
    color: #ffffff;
    overflow: hidden;
}
.container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 80px;
    gap: 80px;
}
.media {
    width: 800px;
    height: 800px;
    object-fit: cover;
    border-radius: 28px;
    flex-shrink: 0;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
.text-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.title {
    font-size: 60px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 28px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.content {
    font-size: 34px;
    line-height: 1.6;
    color: #e0e0e0;
}
</style>
</head>
<body>
<div class="container">
    <img class="media" src="{{ image_path }}" alt="">
    <div class="text-area">
        <h1 class="title">{{ title }}</h1>
        <p class="content">{{ content }}</p>
    </div>
</div>
</body>
</html>
