<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="template:media-width" content="1024">
<meta name="template:media-height" content="1024">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1080px;
    height: 1080px;
    font-family: 'Noto Sans CJK SC', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #ffffff;
    overflow: hidden;
}
.container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    text-align: center;
}
.media {
    width: 600px;
    height: 600px;
    object-fit: cover;
    border-radius: 24px;
    margin-bottom: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.title {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 24px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.content {
    font-size: 32px;
    line-height: 1.6;
    color: #e0e0e0;
    max-width: 900px;
}
</style>
</head>
<body>
<div class="container">
    <img class="media" src="{{ image_path }}" alt="">
    <h1 class="title">{{ title }}</h1>
    <p class="content">{{ content }}</p>
</div>
</body>
</html>
