<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="template:media-width" content="1024">
<meta name="template:media-height" content="1792">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1080px;
    height: 1920px;
    font-family: 'Noto Sans CJK SC', 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    color: #ffffff;
    overflow: hidden;
}
.container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 100px 80px;
}
.media {
    width: 100%;
    height: 960px;
    object-fit: cover;
    border-radius: 32px;
    margin-bottom: 60px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}
.title {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 32px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.7);
}
.content {
    font-size: 36px;
    line-height: 1.7;
    color: #e8e8e8;
    flex: 1;
}
</style>
</head>
<body>
<div class="container">
    <img class="media" src="{{ image_path }}" alt="">
    <h1 class="title">{{ title }}</h1>
    <p class="content">{{ content }}</p>
</div>
</body>
</html>
