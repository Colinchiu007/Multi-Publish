version: "3.9"

services:
  publish-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DRY_RUN=false
      - API_KEY=${API_KEY:-}
      - MAX_RPM=${MAX_RPM:-100}
      - ENABLE_SCHEDULE=${ENABLE_SCHEDULE:-false}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
