name: quality-gate

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Quality Gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      # --- Gate 1: TypeScript 编译检查（严格卡点） ---
      - name: "Gate 1 - TypeScript 编译检查"
        run: cd apps/desktop && npx tsc --noEmit

      # --- Gate 2: 核心 JS 文件语法检查（FUSE 断点保护）---
      - name: "Gate 2 - JS syntax integrity (detect FUSE truncation)"
        run: |
          $errors = 0
          Get-ChildItem -Recurse -Filter "*.js" -Path apps/desktop/electron -Exclude "*node_modules*" | ForEach-Object {
            $result = node --check $_.FullName 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "  [FAIL] $($_.FullName)"
              $errors++
            }
          }
          if ($errors -gt 0) { exit 1 }
          Write-Host "All Electron JS files pass syntax check"

      # --- Gate 3: 硬编码密钥扫描 ---
      - name: "Gate 3 - Hardcoded secrets scan"
        run: |
          node --test .github/scripts/check-hardcoded-secrets.test.js .github/scripts/workflow-contract.test.js
          node .github/scripts/check-hardcoded-secrets.js

      # --- Gate 4: 单元测试（Vitest 全量，卡点要求）---
      - name: "Gate 4 - Unit tests (Vitest)"
        run: npm test

      - name: "Gate 4b - Startup and require smoke tests"
        run: npm run test:startup -w @multi-publish/desktop

      # --- Gate 5: Coverage 检查 ---
      - name: "Gate 5 - Test coverage check"
        run: npm run test:coverage -w @multi-publish/desktop -- --coverage.reporter=text-summary

      # --- Gate 6: IPC bridge completeness ---
      - name: "Gate 6 - IPC bridge completeness"
        id: ipc-check
        run: |
          node .github/scripts/check-ipc-bridge.js
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          echo "IPC_CHECK=PASS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # --- Gate 7: 视觉回归测试 ---
      - name: "Gate 7 - Visual regression"
        id: visual-gate
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          Write-Host "=== Gate 7: Visual Regression Test ==="
          $desktopDir = Join-Path $PWD "apps/desktop"

          Push-Location $desktopDir
          try {
            Write-Host "Installing Playwright chromium..."
            npx.cmd playwright install chromium
            $playwrightExit = $LASTEXITCODE
            if ($playwrightExit -ne 0) { exit $playwrightExit }

            Write-Host "Building Vue frontend..."
            npm.cmd run build:vue
            $buildExit = $LASTEXITCODE
            if ($buildExit -ne 0) { exit $buildExit }
          } finally {
            Pop-Location
          }

          $viteProcess = $null
          $pixelExit = 1
          $judgeExit = 1
          try {
            Write-Host "Starting Vite dev server..."
            $viteProcess = Start-Process -FilePath "npx.cmd" `
              -ArgumentList @("vite", "--host", "127.0.0.1", "--port", "5174") `
              -WorkingDirectory $desktopDir `
              -RedirectStandardOutput (Join-Path $desktopDir "vite-visual.stdout.log") `
              -RedirectStandardError (Join-Path $desktopDir "vite-visual.stderr.log") `
              -WindowStyle Hidden -PassThru

            $viteReady = $false
            for ($i = 1; $i -le 30; $i++) {
              Start-Sleep -Seconds 1
              $viteProcess.Refresh()
              if ($viteProcess.HasExited) {
                throw "Vite exited before becoming ready (exit=$($viteProcess.ExitCode))"
              }
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:5174/" -UseBasicParsing -TimeoutSec 2
                if ($response.StatusCode -eq 200) {
                  Write-Host "Vite ready after $i seconds"
                  $viteReady = $true
                  break
                }
              } catch {}
            }
            if (-not $viteReady) { throw "Vite never became ready" }

            Push-Location $desktopDir
            try {
              Write-Host "Running pixel diff tests..."
              npm.cmd run test:visual:pixel
              $pixelExit = $LASTEXITCODE

              Write-Host "Generating Agent judge report..."
              node tests/visual-testing/scripts/agent-visual-judge.js
              $judgeExit = $LASTEXITCODE
            } finally {
              Pop-Location
            }
          } finally {
            if ($viteProcess -and -not $viteProcess.HasExited) {
              taskkill /PID $viteProcess.Id /T /F 2>$null | Out-Null
            }
          }

          if ($pixelExit -ne 0) {
            Write-Host "[GATE-7] Pixel diff failed - see artifacts for details"
            exit $pixelExit
          }
          if ($judgeExit -ne 0) {
            Write-Host "[GATE-7] Agent visual report generation failed"
            exit $judgeExit
          }
          Write-Host "[GATE-7] All visual tests passed"

      # --- Gate 8: 真实浏览器端到端测试 ---
      - name: "Gate 8 - Browser E2E"
        id: e2e-gate
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          Write-Host "=== Gate 8: Browser E2E ==="
          $desktopDir = Join-Path $PWD "apps/desktop"
          $viteProcess = $null
          $e2eExit = 1
          try {
            $viteProcess = Start-Process -FilePath "npx.cmd" `
              -ArgumentList @("vite", "--host", "127.0.0.1", "--port", "5174") `
              -WorkingDirectory $desktopDir `
              -RedirectStandardOutput (Join-Path $desktopDir "vite-e2e.stdout.log") `
              -RedirectStandardError (Join-Path $desktopDir "vite-e2e.stderr.log") `
              -WindowStyle Hidden -PassThru

            $viteReady = $false
            for ($i = 1; $i -le 30; $i++) {
              Start-Sleep -Seconds 1
              $viteProcess.Refresh()
              if ($viteProcess.HasExited) {
                throw "Vite exited before becoming ready (exit=$($viteProcess.ExitCode))"
              }
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:5174/" -UseBasicParsing -TimeoutSec 2
                if ($response.StatusCode -eq 200) {
                  Write-Host "Vite ready after $i seconds"
                  $viteReady = $true
                  break
                }
              } catch {}
            }
            if (-not $viteReady) { throw "Vite never became ready" }

            npm.cmd run test:e2e -w @multi-publish/desktop
            $e2eExit = $LASTEXITCODE
          } finally {
            if ($viteProcess -and -not $viteProcess.HasExited) {
              taskkill /PID $viteProcess.Id /T /F 2>$null | Out-Null
            }
          }

          if ($e2eExit -ne 0) {
            echo "E2E_GATE=FAIL" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            exit $e2eExit
          }
          echo "E2E_GATE=PASS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "[GATE-8] Browser E2E passed"

      # --- Gate 9: PRD/源码自主覆盖审计 ---
      - name: "Gate 9 - Autonomous coverage audit"
        id: autonomous-gate
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          Write-Host "=== Gate 9: Autonomous Coverage Audit ==="
          $auditArgs = @(
            "packages/ai-autonomous-tester/scripts/run-autonomous-e2e.js",
            "--prd=01-docs/PRD.md",
            "--src=apps/desktop/src",
            "--skip-server",
            "--skip-visual",
            "--docs=01-docs/PRD.md",
            "--threshold=0.5"
          )
          if ($env:OPENAI_API_KEY) { $auditArgs += "--llm=openai" }

          $output = & node @auditArgs 2>&1
          $exitCode = $LASTEXITCODE
          $output | ForEach-Object { Write-Host $_ }
          Write-Host "Autonomous audit exit code: $exitCode"

          if ($exitCode -eq 0) {
            echo "AUTONOMOUS_GATE=PASS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "[GATE-9] Autonomous audit passed"
            exit 0
          } elseif ($exitCode -eq 1) {
            echo "AUTONOMOUS_GATE=FAIL" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            exit 1
          }
          echo "AUTONOMOUS_GATE=INFRA_ERROR" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          exit $exitCode

      - name: "Upload GUI quality artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-gui-reports
          path: |
            apps/desktop/tests/e2e/reports/**
            apps/desktop/tests/visual-testing/reports/**
            apps/desktop/tests/visual-testing/screenshots/**
            apps/desktop/vite-*.log
          if-no-files-found: ignore
          retention-days: 7

      # --- Gate result ---
      - name: "Gate result"
        if: always()
        run: |
          echo ""
          echo "=============================="
          echo "  quality-rhythm CI gate report"
          echo "=============================="
          echo "tsc --noEmit  : ${{ job.status == 'success' && 'PASS' || 'FAIL' }}"
          echo "js syntax     : ${{ job.status == 'success' && 'PASS' || 'FAIL' }}"
          echo "secrets scan  : ${{ job.status == 'success' && 'PASS' || 'FAIL' }}"
          echo "unit tests    : ${{ job.status == 'success' && 'PASS' || 'FAIL' }}"
          echo "coverage      : see step output above"
          echo "IPC bridge    : ${{ env.IPC_CHECK }}"
          echo "visual gate  : ${{ job.status == 'success' && 'PASS' || 'FAIL' }}"
          echo "browser E2E  : ${{ env.E2E_GATE }}"
          echo "autonomous   : ${{ env.AUTONOMOUS_GATE }}"
          echo "=============================="
