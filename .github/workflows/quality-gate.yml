name: quality-gate

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Quality Gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      # --- Gate 1: TypeScript 编译检查（硬门禁） ---
      - name: "Gate 1 - TypeScript 编译检查"
        run: cd apps/desktop && npx tsc --noEmit

      # --- Gate 2: 核心 JS 文件语法检查（FUSE 截断防护） ---
      - name: "Gate 2 - JS syntax integrity (detect FUSE truncation)"
        run: |
          $errors = 0
          Get-ChildItem -Recurse -Filter "*.js" -Path apps/desktop/electron -Exclude "*node_modules*" | ForEach-Object {
            $result = node --check $_.FullName 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "  [FAIL] $($_.FullName)"
              $errors++
            }
          }
          if ($errors -gt 0) { exit 1 }
          Write-Host "All Electron JS files pass syntax check"

      # --- Gate 3: 硬编码密钥扫描 ---
      - name: "Gate 3 - Hardcoded secrets scan"
        run: |
          echo "checking for hardcoded secrets..."
          $hasSecret = Get-ChildItem -Recurse -Filter *.js -Path apps/desktop/electron | Select-String -Pattern "(?i)(api[_-]?key|secret|token|password)\s*=\s*['""][a-zA-Z0-9_\-]{16,}" -Quiet
          if ($hasSecret) { echo "hardcoded secrets found"; exit 1 }
          echo "code quality scan done"

      # --- Gate 4: 单元测试（Vitest 全套，硬门禁） ---
      - name: "Gate 4 - Unit tests (Vitest)"
        run: npm run test -w @multi-publish/desktop

      # --- Gate 5: Coverage 检查 ---
      - name: "Gate 5 - Test coverage check"
        run: cd apps/desktop && npx vitest run --coverage --coverage.reporter=text-summary --coverage.thresholds.lines=60 --coverage.thresholds.branches=50 --coverage.thresholds.functions=60 --coverage.thresholds.statements=60
        continue-on-error: true

      # --- Gate 6: IPC bridge completeness (non-blocking) ---
      - name: "Gate 6 - IPC bridge completeness (non-blocking)"
        id: ipc-check
        continue-on-error: true
        run: |
          try {
            node .github/scripts/check-ipc-bridge.js
            echo "IPC_CHECK=PASS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } catch {
            echo "IPC_CHECK=FAIL" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      # --- Gate result ---
      - name: "Gate result"
        if: always()
        run: |
          echo "=============================="
          echo "  quality-rhythm CI gate report"
          echo "=============================="
          echo "tsc --noEmit  : ${{ job.status == 'success' && 'PASS' || 'FAIL' }}"
          echo "js syntax     : ${{ job.status == 'success' && 'PASS' || 'FAIL' }}"
          echo "secrets scan  : ${{ job.status == 'success' && 'PASS' || 'FAIL' }}"
          echo "unit tests    : ${{ job.status == 'success' && 'PASS' || 'FAIL' }}"
          echo "coverage      : see step output above"
          echo "IPC bridge    : ${{ env.IPC_CHECK }}"
          echo "=============================="
