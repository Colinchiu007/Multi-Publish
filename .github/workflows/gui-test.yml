name: GUI Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/gui-test.yml'
  push:
    branches: [codex/gui-test*, main]
    paths:
      - 'apps/desktop/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/gui-test.yml'
  workflow_dispatch:

jobs:
  gui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install system deps (Xvfb + libvips)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libvips libvips-dev build-essential python3

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (for GUI tests)
        run: npx playwright install --with-deps chromium

      - name: Build Vue frontend
        run: npm run build:vue -w @multi-publish/desktop

      - name: Rebuild native modules
        run: |
          cd apps/desktop
          npx @electron/rebuild -f -w better-sqlite3

      - name: Browser E2E, visual regression, and Electron GUI gates
        shell: bash
        run: |
          set -euo pipefail
          (
            cd apps/desktop
            exec npx vite --host 127.0.0.1 --port 5174
          ) > apps/desktop/vite-ci.log 2>&1 &
          vite_pid=$!
          cleanup() {
            kill "$vite_pid" 2>/dev/null || true
            wait "$vite_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          vite_ready=0
          for i in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:5174/ > /dev/null 2>&1; then
              echo "Vite ready after ${i}s"
              vite_ready=1
              break
            fi
            if ! kill -0 "$vite_pid" 2>/dev/null; then
              echo "Vite exited before becoming ready"
              cat apps/desktop/vite-ci.log
              exit 1
            fi
            sleep 1
          done
          if [ "$vite_ready" -ne 1 ]; then
            echo "Vite never became ready"
            cat apps/desktop/vite-ci.log
            exit 1
          fi

          node apps/desktop/tests/e2e-smoke.js
          npm run test:e2e -w @multi-publish/desktop
          npm run test:visual:pixel -w @multi-publish/desktop
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            node apps/desktop/tests/electron-gui-v9.js

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-test-screenshots
          path: |
            apps/desktop/tests/screenshots/*.png
            apps/desktop/tests/e2e/reports/**
            apps/desktop/tests/visual-testing/reports/**
            apps/desktop/vite-ci.log
          if-no-files-found: warn
          retention-days: 7
