name: Visual Tests

# 视觉回归测试（仅跑本地像素对比 + OCR，无需任何 API Key）
# - 触发：PR / push 主分支 / 手动 dispatch
# - 默认行为：跑像素对比 + 生成 Agent 判断报告（本地全部完成）
# - 判断：Agent 在 PR review 时读取 judge-report.md 并用 view_image 看截图

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/visual-test.yml'
      - '.github/scripts/workflow-contract.test.js'
  push:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/visual-test.yml'
      - '.github/scripts/workflow-contract.test.js'
  workflow_dispatch:

jobs:
  visual-test:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      TEST_URL: http://127.0.0.1:5174
      HEADLESS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium

      - name: Build Vue frontend
        run: npm run build:vue -w @multi-publish/desktop

      - name: Pixel-comparison tests (default, no API Key needed)
        shell: pwsh
        run: |
          $desktopDir = Join-Path $PWD "apps/desktop"
          $viteProcess = Start-Process -FilePath "npx.cmd" `
            -ArgumentList @("vite", "--host", "127.0.0.1", "--port", "5174") `
            -WorkingDirectory $desktopDir `
            -RedirectStandardOutput (Join-Path $desktopDir "vite-visual.stdout.log") `
            -RedirectStandardError (Join-Path $desktopDir "vite-visual.stderr.log") `
            -WindowStyle Hidden -PassThru
          try {
            $viteReady = $false
            for ($i = 1; $i -le 30; $i++) {
              Start-Sleep -Seconds 1
              $viteProcess.Refresh()
              if ($viteProcess.HasExited) { throw "Vite exited before becoming ready (exit=$($viteProcess.ExitCode))" }
              try {
                if ((Invoke-WebRequest -Uri "http://127.0.0.1:5174/" -UseBasicParsing -TimeoutSec 2).StatusCode -eq 200) {
                  Write-Host "Vite ready after $i seconds"
                  $viteReady = $true
                  break
                }
              } catch {}
            }
            if (-not $viteReady) { throw "Vite never became ready" }
            Push-Location $desktopDir
            try {
              npm.cmd run test:visual:pixel
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            } finally {
              Pop-Location
            }
          } finally {
            if (-not $viteProcess.HasExited) { taskkill /PID $viteProcess.Id /T /F 2>$null | Out-Null }
          }

      - name: Generate Agent visual-judge report
        if: always()
        run: |
          echo "=== Agent Visual Judge ==="
          node apps/desktop/tests/visual-testing/scripts/agent-visual-judge.js

      - name: Upload screenshots and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-reports
          path: |
            apps/desktop/tests/visual-testing/screenshots
            apps/desktop/tests/visual-testing/reports
            apps/desktop/vite-visual.*.log
          retention-days: 7
