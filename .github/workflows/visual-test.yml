name: Visual Tests

# 视觉回归测试（仅跑本地像素对比 + OCR，无需任何 API Key）
# - 触发：PR / push 主分支 / 手动 dispatch
# - 默认行为：跑像素对比 + 生成 Agent 判断报告（本地全部完成）
# - 判断：Agent 在 PR review 时读取 judge-report.md 并用 view_image 看截图

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/desktop/**'
  push:
    branches: [main]
    paths:
      - 'apps/desktop/**'
  workflow_dispatch:

jobs:
  visual-test:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      TEST_URL: http://127.0.0.1:5174
      HEADLESS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Linux system deps (libvips + xvfb)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvips libvips-dev build-essential python3 xvfb

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      - name: Build Vue frontend
        run: npm run build:vue -w @multi-publish/desktop

      - name: Start Vite dev server (background)
        run: |
          cd apps/desktop
          npx vite --port 5174 &
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:5174/ > /dev/null 2>&1; then
              echo "Vite ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Vite never became ready"
          exit 1

      - name: Pixel-comparison tests (default, no API Key needed)
        run: npm run test:visual:pixel -w @multi-publish/desktop

      - name: Generate Agent visual-judge report
        if: always()
        run: |
          echo "=== Agent Visual Judge ==="
          node apps/desktop/tests/visual-testing/scripts/agent-visual-judge.js || true

      - name: Upload screenshots and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-reports
          path: |
            apps/desktop/tests/visual-testing/screenshots
            apps/desktop/tests/visual-testing/reports
          retention-days: 7