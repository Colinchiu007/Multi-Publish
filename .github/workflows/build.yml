name: Build & Release

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Sync package version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          node -e "
            const p = require('./apps/desktop/package.json');
            p.version = '${VERSION}';
            require('fs').writeFileSync('./apps/desktop/package.json', JSON.stringify(p, null, 2) + '\n');
          "
          VERSION_AFTER=$(node -p "require('./apps/desktop/package.json').version")
          echo "package version = ${VERSION_AFTER}"

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvips libvips-dev build-essential python3 libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Startup smoke test
        run: npm run test -w @multi-publish/desktop

      - name: Dependency check
        continue-on-error: true
        run: npx depcheck --ignore-dirs=dist,node_modules,.playwright-browsers --ignores=@vitejs/*,vite

      - name: Circular dependency check
        continue-on-error: true
        run: npx madge --warning --circular apps/desktop/electron/main.js

      - name: Build Vue frontend
        run: npm run build:vue -w @multi-publish/desktop

      - name: Rebuild native modules
        run: |
          cd apps/desktop
          npx @electron/rebuild -f -w better-sqlite3

      - name: Install Playwright chromium (bundled)
        shell: bash
        run: |
          cd apps/desktop
          mkdir -p .playwright-browsers
          PLAYWRIGHT_BROWSERS_PATH=.playwright-browsers npx playwright install chromium

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: cd apps/desktop && npx electron-builder --win --x64 -p never
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Multi-Publish-Windows
          path: apps/desktop/dist-electron/Multi-Publish*.exe
          retention-days: 30

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        run: cd apps/desktop && npx electron-builder --linux --x64 -p never
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Multi-Publish-Linux
          path: apps/desktop/dist-electron/Multi-Publish*.AppImage
          retention-days: 30

      - name: Build Electron app (macOS)
        if: runner.os == 'macOS'
        run: cd apps/desktop && npx electron-builder --mac --universal -p never
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Multi-Publish-macOS
          path: |
            apps/desktop/dist-electron/Multi-Publish*.dmg
            apps/desktop/dist-electron/Multi-Publish*.zip
          retention-days: 30

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifact directories
        shell: bash
        run: |
          find release-assets -type f -exec mv {} release-assets/ \;
          find release-assets -type d -empty -delete

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          NOTES="## What's Changed in v${VERSION}"
          printf -v NL '\n\n'
          NOTES="${NOTES}${NL}Full changelog: https://github.com/${{ github.repository }}/compare/v${VERSION}...HEAD"
          if [ -f CHANGELOG.md ]; then
            CHUNK=$(awk -v ver="$VERSION" '
              BEGIN { capture=0 }
              /^## \[v/ {
                if (index($0, "v"ver"]") > 0) { capture=1; next }
                if (capture==1) { capture=0 }
              }
              capture==1 { print }
            ' CHANGELOG.md)
            if [ -n "$CHUNK" ]; then
              NOTES=$(printf '%s\n\n%s' "$NOTES" "$CHUNK")
            fi
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Multi-Publish ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: release-assets/*
          draft: false
          prerelease: false

      - name: Sync to Gitee Release
        if: env.GITEE_TOKEN != ''
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ColinChiu007
          GITEE_REPO: Multi-Publish
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          curl -fsS -X POST "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"${GITEE_TOKEN}\",\"tag_name\":\"${TAG}\",\"name\":\"Multi-Publish ${TAG}\"}" > /dev/null
          # Upload Windows asset to Gitee
          ASSET_PATH=$(ls release-assets/Multi-Publish.Setup.*.exe 2>/dev/null | head -1)
          if [ -n "$ASSET_PATH" ]; then
            curl -fsS -X POST "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/$(curl -s \"https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/tags/${TAG}\" | python3 -c \"import sys,json; print(json.load(sys.stdin)['id'])\")/attach_files" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${ASSET_PATH}"
          fi
