name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Vue frontend
        run: npm run build:vue -w @multi-publish/desktop

      - name: Install electron-builder globally + install electron locally
        run: |
          cd apps/desktop
          npm install electron@33.0.0
          npm install electron-builder@latest

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: cd apps/desktop && npx electron-builder --win --x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_ALLOW_HARDENING_ISSUES: '1'

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        run: cd apps/desktop && npx electron-builder --linux --x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Multi-Publish-Windows
          path: apps/desktop/dist-electron/Multi-Publish*.exe
          retention-days: 7

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Multi-Publish-Linux
          path: apps/desktop/dist-electron/Multi-Publish*.AppImage
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: Multi-Publish-Windows
          path: release-assets

      - name: Download Linux asset
        uses: actions/download-artifact@v4
        with:
          name: Multi-Publish-Linux
          path: release-assets

      - name: Generate latest.yml
        run: |
          set -e
          cd release-assets
          WIN_FILE=$(ls *.exe | head -1)
          LINUX_FILE=$(ls *.AppImage | head -1)
          VERSION='${{ github.ref_name }}'
          VERSION=${VERSION#v}

          WIN_SHA=$(sha256sum "$WIN_FILE" | cut -d' ' -f1)
          LINUX_SHA=$(sha256sum "$LINUX_FILE" | cut -d' ' -f1)
          WIN_SIZE=$(stat -c%s "$WIN_FILE")
          LINUX_SIZE=$(stat -c%s "$LINUX_FILE")
          RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          cat > latest.yml << EOF
          version: ${VERSION}
          releaseDate: ${RELEASE_DATE}
          files:
            - url: ${WIN_FILE}
              sha256: ${WIN_SHA}
              size: ${WIN_SIZE}
            - url: ${LINUX_FILE}
              sha256: ${LINUX_SHA}
              size: ${LINUX_SIZE}
          path: ${WIN_FILE}
          sha256: ${WIN_SHA}
          EOF
          echo "=== latest.yml ==="
          cat latest.yml

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Multi-Publish ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            release-assets/*
            release-assets/latest.yml
