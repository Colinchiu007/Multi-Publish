name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue frontend
        run: npm run build:vue -w @multi-publish/desktop

      - name: Install electron & builder (with rebuild)
        run: |
          cd apps/desktop
          npm install electron@33.4.0
          npm install electron-builder@25.1.8
          npm rebuild electron-builder

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: cd apps/desktop && npx electron-builder --win --x64 -p never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Multi-Publish-Windows
          path: apps/desktop/dist-electron/Multi-Publish*.exe
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: Multi-Publish-Windows
          path: release-assets

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Multi-Publish ${{ github.ref_name }}
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
