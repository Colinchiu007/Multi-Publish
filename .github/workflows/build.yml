name: Build & Release

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Linux 需要 libvips（sharp 依赖）和 C++ 编译工具（better-sqlite3）
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvips libvips-dev build-essential python3

      - name: Install dependencies
        run: npm ci

      - name: Build Vue frontend
        run: npm run build:vue -w @multi-publish/desktop

      # 显式安装 @electron/rebuild 并重建原生模块
      # app-builder-lib@25.1.8 缺少 remote-rebuild.js，内置 rebuilder 会失败
      - name: Rebuild native modules
        run: |
          cd apps/desktop
          npx @electron/rebuild -f -w better-sqlite3

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: cd apps/desktop && npx electron-builder --win --x64 -p never
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Multi-Publish-Windows
          path: apps/desktop/dist-electron/Multi-Publish*.exe
          retention-days: 30

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        run: cd apps/desktop && npx electron-builder --linux --x64 --dir
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: Multi-Publish-Windows
          path: release-assets

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \\[v${VERSION}\\]/,/^## /" CHANGELOG.md | head -n -1)
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes=Auto release v$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Multi-Publish ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: release-assets/*
          draft: false
          prerelease: false