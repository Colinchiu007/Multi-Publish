name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Linux 需要 libvips（sharp 依赖）和 C++ 编译工具（better-sqlite3）
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvips libvips-dev build-essential python3

      - name: Install dependencies
        run: npm install

      - name: Build Vue frontend
        run: npm run build:vue -w @multi-publish/desktop

      - name: Install Electron & rebuild native modules
        run: |
          cd apps/desktop
          npm install electron@33.4.0
          npm install electron-builder@25.1.8
          npx @electron/rebuild

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: cd apps/desktop && npx electron-builder --win --x64 -p never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Multi-Publish-Windows
          path: apps/desktop/dist-electron/Multi-Publish*.exe
          retention-days: 30

  auto-tag:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto bump patch version
        id: bump
        run: |
          CUR=$(node -p "require('./apps/desktop/package.json').version")
          echo "Current version: $CUR"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CUR"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./apps/desktop/package.json', 'utf8'));
            pkg.version = '$NEW';
            fs.writeFileSync('./apps/desktop/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "new_version=$NEW" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name "Auto Release"
          git config user.email "bot@multi-publish.app"
          git add apps/desktop/package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: Multi-Publish-Windows
          path: release-assets

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## v${VERSION}/,/^## /" CHANGELOG.md | head -n -1)
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes=Auto release v$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Multi-Publish ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: release-assets/*
          draft: false
          prerelease: false
