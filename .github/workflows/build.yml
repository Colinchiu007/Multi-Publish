name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Multi-Publish
        uses: actions/checkout@v4

      - name: Checkout shared modules
        uses: actions/checkout@v4
        with:
          repository: Colinchiu007/content-aggregator-shared
          path: shared-modules

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Vue frontend
        run: npm run build:vue

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          pip install -e ./shared-modules
          pip install -r python/requirements-runtime.txt

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win --x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Multi-Publish-Windows
          path: dist-electron/*.exe
          if-no-files-found: warn

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Multi-Publish-Linux
          path: dist/*.AppImage
          if-no-files-found: warn