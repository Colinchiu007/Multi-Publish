<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多平台一键发布</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🚀 一键发布</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item active">🏠 首页</a>
                <a href="/publish" class="nav-item">📝 发布</a>
                <a href="/accounts" class="nav-item">👤 账号管理</a>
                <a href="/tasks" class="nav-item">📋 任务列表</a>
            </nav>
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot online"></span>
                    <span>服务运行中</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="top-bar">
                <h2>首页</h2>
                <div class="quick-stats" id="quickStats">
                    <span class="stat-item">📊 加载中...</span>
                </div>
            </header>

            <div class="content-area">
                <!-- 快速发布卡片 -->
                <div class="card">
                    <h3>快速发布</h3>
                    <p class="card-desc">从 PROJECT-001 改写完成后，点击一键发布到多个平台</p>
                    <a href="/publish" class="btn btn-primary">开始发布 →</a>
                </div>

                <!-- 平台支持 -->
                <div class="card">
                    <h3>支持平台</h3>
                    <div class="platform-grid">
                        <div class="platform-item">
                            <span class="platform-icon">📱</span>
                            <span class="platform-name">微信公众号</span>
                            <span class="platform-badge done">✅</span>
                        </div>
                        <div class="platform-item">
                            <span class="platform-icon">📖</span>
                            <span class="platform-name">知乎</span>
                            <span class="platform-badge todo">📋</span>
                        </div>
                        <div class="platform-item">
                            <span class="platform-icon">🔵</span>
                            <span class="platform-name">微博</span>
                            <span class="platform-badge todo">🔜</span>
                        </div>
                        <div class="platform-item">
                            <span class="platform-icon">🎵</span>
                            <span class="platform-name">抖音</span>
                            <span class="platform-badge todo">🔜</span>
                        </div>
                    </div>
                </div>

                <!-- 最近任务 -->
                <div class="card">
                    <h3>最近任务 <a href="/tasks" class="text-link">查看全部 →</a></h3>
                    <div id="recentTasks">
                        <p class="text-muted">暂无任务</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // WebSocket 连接
        let ws;
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'task_update') {
                    refreshStats();
                    refreshRecentTasks();
                }
            };

            ws.onclose = () => {
                setTimeout(connectWS, 3000);
            };
        }

        // 刷新统计
        async function refreshStats() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                const stats = data.queue_stats;
                document.getElementById('quickStats').innerHTML = `
                    <span class="stat-item">📊 总任务: ${stats.total}</span>
                    <span class="stat-item">⏳ 等待: ${stats.pending}</span>
                    <span class="stat-item">🔄 运行: ${stats.running}</span>
                    <span class="stat-item">✅ 成功: ${stats.success}</span>
                    <span class="stat-item">❌ 失败: ${stats.failed}</span>
                `;
            } catch (e) {
                console.error('刷新统计失败:', e);
            }
        }

        // 刷新最近任务
        async function refreshRecentTasks() {
            try {
                const res = await fetch('/api/tasks?limit=5');
                const data = await res.json();
                const container = document.getElementById('recentTasks');
                if (data.tasks.length === 0) {
                    container.innerHTML = '<p class="text-muted">暂无任务</p>';
                    return;
                }
                container.innerHTML = data.tasks.slice(0, 5).map(t => `
                    <div class="task-row">
                        <span class="task-title">${escapeHtml(t.title)}</span>
                        <span class="task-status status-${t.status}">${t.status}</span>
                        <span class="task-time">${formatTime(t.created_at)}</span>
                    </div>
                `).join('');
            } catch (e) {
                console.error('刷新任务失败:', e);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(isoStr) {
            const d = new Date(isoStr);
            return d.toLocaleString('zh-CN', { hour12: false });
        }

        // 初始化
        connectWS();
        refreshStats();
        refreshRecentTasks();
        setInterval(refreshStats, 30000);
        setInterval(refreshRecentTasks, 30000);
    </script>
</body>
</html>
