<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务列表 — 多平台一键发布</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🚀 一键发布</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">🏠 首页</a>
                <a href="/publish" class="nav-item">📝 发布</a>
                <a href="/accounts" class="nav-item">👤 账号管理</a>
                <a href="/tasks" class="nav-item active">📋 任务列表</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>任务列表</h2>
                <div class="filter-bar">
                    <select id="statusFilter">
                        <option value="">全部状态</option>
                        <option value="pending">等待中</option>
                        <option value="running">运行中</option>
                        <option value="success">成功</option>
                        <option value="failed">失败</option>
                        <option value="cancelled">已取消</option>
                    </select>
                    <button class="btn btn-secondary" onclick="refreshTasks()">🔄 刷新</button>
                </div>
            </header>

            <div class="content-area">
                <!-- 统计卡片 -->
                <div class="stats-row" id="statsRow">
                    <div class="stat-card">
                        <div class="stat-number" id="statTotal">0</div>
                        <div class="stat-label">总任务</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statPending">0</div>
                        <div class="stat-label">等待中</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statRunning">0</div>
                        <div class="stat-label">运行中</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statSuccess">0</div>
                        <div class="stat-label">成功</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statFailed">0</div>
                        <div class="stat-label">失败</div>
                    </div>
                </div>

                <!-- 任务列表 -->
                <div class="card">
                    <h3>任务列表</h3>
                    <div id="taskList">
                        <p class="text-muted">加载中...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let ws;

        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'task_update') {
                    refreshTasks();
                }
            };

            ws.onclose = () => {
                setTimeout(connectWS, 3000);
            };
        }

        async function refreshTasks() {
            const status = document.getElementById('statusFilter').value;
            let url = '/api/tasks?limit=100';
            if (status) url += `&status=${status}`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                // 更新统计
                document.getElementById('statTotal').textContent = data.stats.total;
                document.getElementById('statPending').textContent = data.stats.pending;
                document.getElementById('statRunning').textContent = data.stats.running;
                document.getElementById('statSuccess').textContent = data.stats.success;
                document.getElementById('statFailed').textContent = data.stats.failed;

                // 渲染任务列表
                const container = document.getElementById('taskList');
                if (data.tasks.length === 0) {
                    container.innerHTML = '<p class="text-muted">暂无任务</p>';
                    return;
                }

                container.innerHTML = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>任务ID</th>
                                <th>标题</th>
                                <th>平台</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.tasks.map(t => `
                                <tr>
                                    <td><code>${t.id}</code></td>
                                    <td title="${escapeHtml(t.title)}">${escapeHtml(t.title).slice(0, 30)}${t.title.length > 30 ? '...' : ''}</td>
                                    <td>${t.platforms.map(p => `<span class="badge badge-${p}">${p}</span>`).join(' ')}</td>
                                    <td><span class="status-badge status-${t.status}">${t.status}</span></td>
                                    <td>${formatTime(t.created_at)}</td>
                                    <td>
                                        ${t.status === 'running' || t.status === 'pending' ? `
                                            <button class="btn btn-sm btn-danger" onclick="cancelTask('${t.id}')">取消</button>
                                        ` : ''}
                                        ${t.status === 'failed' ? `
                                            <button class="btn btn-sm btn-primary" onclick="retryTask('${t.id}')">重试</button>
                                        ` : ''}
                                        ${t.results && Object.keys(t.results).length > 0 ? `
                                            <button class="btn btn-sm btn-secondary" onclick="showDetails('${t.id}')">详情</button>
                                        ` : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                console.error('刷新任务失败:', e);
            }
        }

        async function cancelTask(taskId) {
            if (!confirm('确定取消该任务？')) return;
            try {
                const res = await fetch(`/api/tasks/${taskId}/cancel`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    refreshTasks();
                } else {
                    alert('取消失败');
                }
            } catch (e) {
                alert('网络错误');
            }
        }

        async function retryTask(taskId) {
            try {
                const res = await fetch(`/api/tasks/${taskId}/retry`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    refreshTasks();
                } else {
                    alert('重试失败（可能已达最大重试次数）');
                }
            } catch (e) {
                alert('网络错误');
            }
        }

        function showDetails(taskId) {
            // 可以展开显示各平台发布结果
            alert(`任务 ${taskId} 的详细信息待完善`);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(isoStr) {
            const d = new Date(isoStr);
            return d.toLocaleString('zh-CN', { hour12: false });
        }

        document.getElementById('statusFilter').addEventListener('change', refreshTasks);

        connectWS();
        refreshTasks();
        setInterval(refreshTasks, 10000);
    </script>
</body>
</html>
