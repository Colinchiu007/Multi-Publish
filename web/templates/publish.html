<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布内容 — 多平台一键发布</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🚀 一键发布</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">🏠 首页</a>
                <a href="/publish" class="nav-item active">📝 发布</a>
                <a href="/accounts" class="nav-item">👤 账号管理</a>
                <a href="/tasks" class="nav-item">📋 任务列表</a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="top-bar">
                <h2>发布内容</h2>
            </header>

            <div class="content-area">
                <div class="card">
                    <h3>发布文章</h3>
                    <form id="publishForm">
                        <!-- 标题 -->
                        <div class="form-group">
                            <label for="title">标题 <span class="required">*</span></label>
                            <input type="text" id="title" name="title" placeholder="输入文章标题" required maxlength="200">
                        </div>

                        <!-- 内容 -->
                        <div class="form-group">
                            <label for="content">内容 <span class="required">*</span></label>
                            <textarea id="content" name="content" rows="15" placeholder="输入文章内容（支持 Markdown）" required></textarea>
                            <div class="form-hint">支持 Markdown 格式，发布前会自动转换为各平台所需格式</div>
                        </div>

                        <!-- 平台选择 -->
                        <div class="form-group">
                            <label>选择发布平台 <span class="required">*</span></label>
                            <div class="platform-checkboxes">
                                <label class="checkbox-card">
                                    <input type="checkbox" name="platforms" value="wechat_mp">
                                    <span class="checkbox-label">
                                        <span class="platform-icon">📱</span>
                                        微信公众号
                                    </span>
                                </label>
                                <label class="checkbox-card disabled">
                                    <input type="checkbox" name="platforms" value="zhihu" disabled>
                                    <span class="checkbox-label">
                                        <span class="platform-icon">📖</span>
                                        知乎 <span class="badge coming-soon">开发中</span>
                                    </span>
                                </label>
                                <label class="checkbox-card disabled">
                                    <input type="checkbox" name="platforms" value="weibo" disabled>
                                    <span class="checkbox-label">
                                        <span class="platform-icon">🔵</span>
                                        微博 <span class="badge coming-soon">预留</span>
                                    </span>
                                </label>
                                <label class="checkbox-card disabled">
                                    <input type="checkbox" name="platforms" value="douyin" disabled>
                                    <span class="checkbox-label">
                                        <span class="platform-icon">🎵</span>
                                        抖音 <span class="badge coming-soon">预留</span>
                                    </span>
                                </label>
                            </div>
                        </div>

                        <!-- 选项 -->
                        <div class="form-group form-row">
                            <label class="checkbox-inline">
                                <input type="checkbox" name="draft" value="true">
                                保存为草稿（不直接发布）
                            </label>
                            <div class="form-hint" style="margin-top: 8px;">
                                <strong>草稿模式</strong>：文章保存到草稿箱，需手动发布<br>
                                <strong>正式发布</strong>：直接发布到公众号（需要企业认证公众号权限）
                            </div>
                        </div>

                        <!-- 定时发布 -->
                        <div class="form-group">
                            <label for="scheduled_at">定时发布（可选）</label>
                            <input type="datetime-local" id="scheduled_at" name="scheduled_at">
                            <div class="form-hint">留空表示立即发布</div>
                        </div>

                        <!-- 提交按钮 -->
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="submitBtn">
                                立即发布
                            </button>
                            <button type="button" class="btn btn-secondary" id="scheduleBtn" disabled>
                                定时发布
                            </button>
                        </div>
                    </form>

                    <!-- 发布结果 -->
                    <div id="publishResult" class="result-box" style="display:none;">
                        <h4>发布结果</h4>
                        <div id="resultContent"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('publishForm');
        const resultBox = document.getElementById('publishResult');
        const resultContent = document.getElementById('resultContent');
        const submitBtn = document.getElementById('submitBtn');
        const scheduleBtn = document.getElementById('scheduleBtn');
        const scheduledAtInput = document.getElementById('scheduled_at');

        // 定时发布按钮状态
        scheduledAtInput.addEventListener('change', () => {
            scheduleBtn.disabled = !scheduledAtInput.value;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const platforms = Array.from(document.querySelectorAll('input[name="platforms"]:checked')).map(cb => cb.value);
            const draft = document.querySelector('input[name="draft"]:checked') !== null;
            const scheduledAt = scheduledAtInput.value;

            if (!title || !content) {
                alert('标题和内容不能为空');
                return;
            }
            if (platforms.length === 0) {
                alert('请至少选择一个平台');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '发布中...';

            try {
                const res = await fetch('/api/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title,
                        content,
                        platforms,
                        draft,
                        scheduled_at: scheduledAt || undefined,
                    }),
                });

                const data = await res.json();

                if (data.success) {
                    resultBox.style.display = 'block';
                    if (data.type === 'scheduled') {
                        resultContent.innerHTML = `
                            <div class="alert alert-success">
                                ✅ 已加入定时发布队列
                                <br>调度ID: <code>${data.schedule_id}</code>
                                <br>计划时间: ${new Date(data.scheduled_at).toLocaleString('zh-CN')}
                            </div>
                        `;
                    } else {
                        resultContent.innerHTML = `
                            <div class="alert alert-success">
                                ✅ 任务已加入队列
                                <br>任务ID: <code>${data.task_id}</code>
                                <br>请在 <a href="/tasks">任务列表</a> 中查看进度
                            </div>
                        `;
                    }
                } else {
                    throw new Error(data.detail || '发布失败');
                }
            } catch (err) {
                resultBox.style.display = 'block';
                resultContent.innerHTML = `
                    <div class="alert alert-error">
                        ❌ ${err.message}
                    </div>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '立即发布';
            }
        });
    </script>
</body>
</html>
