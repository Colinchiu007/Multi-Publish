<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号管理 — 多平台一键发布</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .account-row {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            gap: 12px;
        }
        .account-row:last-child { border-bottom: none; }
        .account-platform {
            font-weight: bold;
            min-width: 80px;
        }
        .account-name { flex: 1; }
        .account-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .account-status.active { background: #e8f5e9; color: #2e7d32; }
        .account-status.inactive { background: #ffebee; color: #c62828; }
        .account-actions { display: flex; gap: 8px; }
        .btn-small {
            padding: 4px 12px;
            font-size: 12px;
        }
        .config-section {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            margin-top: 12px;
        }
        .edit-form { display: none; }
        .edit-form.visible { display: block; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🚀 一键发布</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">🏠 首页</a>
                <a href="/publish" class="nav-item">📝 发布</a>
                <a href="/accounts" class="nav-item active">👤 账号管理</a>
                <a href="/tasks" class="nav-item">📋 任务列表</a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="top-bar">
                <h2>账号管理</h2>
            </header>

            <div class="content-area">
                <!-- 添加账号表单 -->
                <div class="card">
                    <h3>添加平台账号</h3>
                    <p class="card-desc">所有凭证均加密存储（AES-256），重启后仍存在</p>

                    <form id="accountForm">
                        <div class="form-group">
                            <label for="platform">平台 <span class="required">*</span></label>
                            <select id="platform" name="platform" required>
                                <option value="">请选择平台</option>
                                <option value="wechat_mp">📱 微信公众号</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="name">账号名称 <span class="required">*</span></label>
                            <input type="text" id="name" name="name" placeholder="如：我的公众号" required>
                        </div>

                        <!-- 微信公众号配置 -->
                        <div id="wechatConfig" class="config-section" style="display:none;">
                            <div class="form-group">
                                <label for="wechat_app_id">AppID <span class="required">*</span></label>
                                <input type="text" id="wechat_app_id" name="config.app_id" placeholder="wxXXXXXXXXXXXXXXXX">
                            </div>
                            <div class="form-group">
                                <label for="wechat_app_secret">AppSecret <span class="required">*</span></label>
                                <input type="password" id="wechat_app_secret" name="config.app_secret" placeholder="输入 AppSecret">
                            </div>
                            <div class="form-group">
                                <label class="checkbox-inline">
                                    <input type="checkbox" id="is_active" name="is_active" checked>
                                    启用此账号
                                </label>
                            </div>
                            <div class="form-hint">
                                获取方式：微信公众平台 → 开发 → 基本配置
                                <br>需要 <strong>企业认证</strong> 公众号才能使用 <code>/cgi-bin/publish</code> 正式发布接口
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">保存账号</button>
                        </div>
                    </form>
                </div>

                <!-- 已配置账号列表 -->
                <div class="card">
                    <h3>已配置账号</h3>
                    <div id="accountList">
                        <p class="text-muted">加载中...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const platformSelect = document.getElementById('platform');
        const wechatConfig = document.getElementById('wechatConfig');
        const accountForm = document.getElementById('accountForm');
        const accountList = document.getElementById('accountList');

        // 平台切换显示配置
        platformSelect.addEventListener('change', () => {
            wechatConfig.style.display = platformSelect.value === 'wechat_mp' ? 'block' : 'none';
        });

        // 添加账号
        accountForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const platform = platformSelect.value;
            const name = document.getElementById('name').value.trim();
            const is_active = document.getElementById('is_active').checked;

            if (!platform || !name) {
                alert('平台和账号名称必填');
                return;
            }

            const config = {};
            if (platform === 'wechat_mp') {
                config.app_id = document.getElementById('wechat_app_id').value.trim();
                config.app_secret = document.getElementById('wechat_app_secret').value.trim();
                if (!config.app_id || !config.app_secret) {
                    alert('AppID 和 AppSecret 必填');
                    return;
                }
            }

            try {
                const res = await fetch('/api/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ platform, name, config, is_active }),
                });

                const data = await res.json();
                if (data.success) {
                    alert('✅ ' + data.message);
                    accountForm.reset();
                    wechatConfig.style.display = 'none';
                    loadAccounts();
                } else {
                    alert('❌ ' + (data.detail || '添加失败'));
                }
            } catch (err) {
                alert('❌ 网络错误');
            }
        });

        // 加载账号列表
        async function loadAccounts() {
            try {
                const res = await fetch('/api/accounts');
                const data = await res.json();
                
                if (data.accounts.length === 0) {
                    accountList.innerHTML = '<p class="text-muted">暂无已配置账号</p>';
                    return;
                }

                accountList.innerHTML = data.accounts.map(a => `
                    <div class="account-row" data-id="${a.id}">
                        <span class="account-platform">${formatPlatform(a.platform)}</span>
                        <span class="account-name">${escapeHtml(a.name)}</span>
                        <span class="account-status ${a.is_active ? 'active' : 'inactive'}">${a.is_active ? '✅ 启用' : '❌ 禁用'}</span>
                        <span class="account-time">${a.created_at ? new Date(a.created_at).toLocaleString('zh-CN') : ''}</span>
                        <div class="account-actions">
                            <button class="btn btn-small btn-secondary" onclick="validateAccount('${a.id}')">验证</button>
                            <button class="btn btn-small btn-secondary" onclick="toggleAccount('${a.id}', ${a.is_active})">${a.is_active ? '禁用' : '启用'}</button>
                            <button class="btn btn-small btn-danger" onclick="deleteAccount('${a.id}')">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载账号失败:', e);
                accountList.innerHTML = '<p class="text-muted">加载失败，请刷新重试</p>';
            }
        }

        // 验证账号
        async function validateAccount(accountId) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '验证中...';

            try {
                const res = await fetch(`/api/accounts/${accountId}/validate`, { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    alert('✅ ' + (data.result?.message || '验证成功'));
                } else {
                    alert('❌ ' + (data.error || '验证失败'));
                }
            } catch (err) {
                alert('❌ 网络错误');
            } finally {
                btn.disabled = false;
                btn.textContent = '验证';
            }
        }

        // 切换账号启用状态
        async function toggleAccount(accountId, currentActive) {
            const newActive = !currentActive;
            try {
                const res = await fetch(`/api/accounts/${accountId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_active: newActive }),
                });
                const data = await res.json();
                if (data.success) {
                    loadAccounts();
                }
            } catch (err) {
                alert('❌ 操作失败');
            }
        }

        // 删除账号
        async function deleteAccount(accountId) {
            if (!confirm('确定要删除此账号吗？')) return;

            try {
                const res = await fetch(`/api/accounts/${accountId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    loadAccounts();
                } else {
                    alert('❌ 删除失败');
                }
            } catch (err) {
                alert('❌ 网络错误');
            }
        }

        // 工具函数
        function formatPlatform(platform) {
            const map = { wechat_mp: '📱 微信公众号' };
            return map[platform] || platform;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始加载
        loadAccounts();
    </script>
</body>
</html>
