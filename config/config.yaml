# PROJECT-003 配置文件

# 服务
server:
  host: "0.0.0.0"
  port: 8081

# 发布器配置
publishers:
  wechat_mp:
    # 微信公众号 API 配置
    # 需要企业认证公众号
    enabled: true
    # app_id: "wxXXXXXXXXXXXXXXXX"
    # app_secret: "your_app_secret_here"

# 加密
crypto:
  # 主密码（生产环境必填，用于派生密钥）
  # 使用强密码，重启后仍可解密凭证
  master_password: "project003-secret-key-change-in-production"

# 共享认证配置
auth:
  jwt_secret: "project003-jwt-secret-change-in-production"
  database_type: sqlite
  sqlite_path: ./data/user.db
  access_token_expire_minutes: 10080  # 7 天
  refresh_token_expire_days: 30
  # 如果为空，使用随机密钥（开发模式，重启后无法解密已有凭证）

# 任务队列
queue:
  max_concurrent: 3  # 最大并发任务数

# 平台账号（运行时通过 API 添加，此文件仅作为默认配置）
accounts: []
