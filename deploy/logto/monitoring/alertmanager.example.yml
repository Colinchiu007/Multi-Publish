global:
  resolve_timeout: 5m

route:
  receiver: operations-webhook
  group_by: [alertname, job]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: operations-webhook
    webhook_configs:
      - url: https://alerts.example.com/multi-publish
        send_resolved: true
